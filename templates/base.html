<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}College System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    .site-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brand {
      font-size: 1.8em;
      font-weight: bold;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand:hover {
      color: #f0f0f0;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 5px;
      transition: all 0.3s;
    }

    nav a:hover {
      background-color: rgba(255,255,255,0.2);
    }

    .muted {
      color: rgba(255,255,255,0.8);
      font-size: 0.95em;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .flash-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .flash {
      padding: 15px 20px;
      margin-bottom: 10px;
      border-radius: 5px;
      font-weight: 500;
      animation: slideIn 0.3s ease-in-out;
    }

    .flash.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .flash.danger {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .flash.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }

    .flash.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button,
    .btn {
      padding: 10px 20px;
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    button:hover,
    .btn:hover {
      background-color: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th {
      background-color: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    table tr:hover {
      background-color: #f8f9fa;
    }

    @media (max-width: 768px) {
      .header-row {
        flex-direction: column;
        gap: 15px;
      }

      nav {
        flex-direction: column;
        width: 100%;
      }

      .container {
        padding: 10px;
      }

      .flash {
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a href="{{ url_for('dashboard') if user else url_for('home') }}" class="brand">🎓 College System</a>
      <nav>
        {% if user %}
          <span class="muted">{{ user.username }} ({{ user.role }})</span>
          <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
          <a href="{{ url_for('login_get') }}">Login</a>
          <a href="{{ url_for('signup_get') }}">Sign Up</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% if messages %}
      <div class="flash-list">
        {% for item in messages %}
          <div class="flash {{ item.cat }}">{{ item.msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer style="text-align: center; color: #999; margin-top: 40px; padding: 20px; border-top: 1px solid #eee;">
    <p>&copy; 2024 College Academic Management System. All rights reserved.</p>
  </footer>
</body>
</html>
