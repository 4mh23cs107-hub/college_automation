{% extends 'base.html' %}
{% block title %}Sign Up - College System{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
  <div class="card" style="width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);">
    <div style="text-align: center; margin-bottom: 30px;">
      <h1 style="font-size: 2em; color: #667eea; margin-bottom: 10px;">📝 Sign Up</h1>
      <p style="color: #999;">Create your College account</p>
    </div>

    <form method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username or USN (for students)" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter a strong password" required />
      </div>

      <div class="form-group">
        <label>Account Type</label>
        <select name="role" required>
          <option value="">-- Select your role --</option>
          <option value="Student">🎓 Student</option>
          <option value="Faculty">👨‍🏫 Faculty</option>
          <option value="HOD">👔 Head of Department</option>
          <option value="Admin">🔧 Administrator</option>
        </select>
      </div>

      <div style="margin-top: 25px; margin-bottom: 15px;">
        <button type="submit" style="width: 100%; padding: 12px;">Create Account</button>
      </div>

      <div style="text-align: center;">
        <p style="color: #999;">Already have an account?</p>
        <a href="{{ url_for('login_get') }}" style="color: #667eea; text-decoration: none; font-weight: 500;">Go to login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
