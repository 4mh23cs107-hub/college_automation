{% extends 'base.html' %}
{% block title %}Manage Students{% endblock %}
{% block content %}
<div class="card">
  <h1>Students</h1>
  <a class="btn" href="{{ url_for('admin_add_student') }}">Add Student</a>
  <table class="table">
    <thead><tr><th>USN</th><th>Name</th><th>Dept</th><th>Sem</th><th>Actions</th></tr></thead>
    <tbody>
      {% for s in students %}
      <tr>
        <td>{{ s.usn }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.dept }}</td>
        <td>{{ s.semester }}</td>
        <td>
          <a href="{{ url_for('admin_edit_student', sid=s.id) }}">Edit</a>
          <form action="{{ url_for('admin_delete_student', sid=s.id) }}" method="post" style="display:inline">
            <button class="btn small" type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
