{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
  <div class="card">
    <h1 style="font-size: 2em; color: #333; margin-bottom: 30px;">➕ Add New Student</h1>
    
    <form method="post">
      <div class="form-group">
        <label>Student USN (Unique Student Number)</label>
        <input type="text" name="usn" placeholder="e.g., 1PV16CS001" required />
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter student's full name" required />
      </div>

      <div class="form-group">
        <label>Department</label>
        <select name="dept" style="background-color: white; color: #1a1a2e; border: 1px solid #ddd; padding: 10px;">
          <option value="" style="background-color: #f0f0f0; color: #999;">-- Select Department --</option>
          <option value="CSE" style="background-color: #e3f2fd; color: #0066cc;">Computer Science & Engineering</option>
          <option value="ECE" style="background-color: #f3e5f5; color: #7b1fa2;">Electronics & Communication</option>
          <option value="ME" style="background-color: #fff3e0; color: #e65100;">Mechanical Engineering</option>
          <option value="EE" style="background-color: #e0f2f1; color: #00796b;">Electrical Engineering</option>
          <option value="CIVIL" style="background-color: #fce4ec; color: #c2185b;">Civil Engineering</option>
        </select>
      </div>

      <div class="form-group">
        <label>Semester</label>
        <select name="semester" style="background-color: white; color: #1a1a2e; border: 1px solid #ddd; padding: 10px;">
          <option value="" style="background-color: #f0f0f0; color: #999;">-- Select Semester --</option>
          <option value="1" style="background-color: #e8f5e9; color: #2e7d32;">1st Semester</option>
          <option value="2" style="background-color: #e3f2fd; color: #0066cc;">2nd Semester</option>
          <option value="3" style="background-color: #f3e5f5; color: #7b1fa2;">3rd Semester</option>
          <option value="4" style="background-color: #fce4ec; color: #c2185b;">4th Semester</option>
          <option value="5" style="background-color: #fff3e0; color: #e65100;">5th Semester</option>
          <option value="6" style="background-color: #e0f2f1; color: #00796b;">6th Semester</option>
          <option value="7" style="background-color: #f1f8e9; color: #558b2f;">7th Semester</option>
          <option value="8" style="background-color: #ede7f6; color: #512da8;">8th Semester</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 30px;">
        <button type="submit" style="flex: 1; padding: 12px;">✅ Add Student</button>
        <a href="{{ url_for('admin_students') }}" style="flex: 1; padding: 12px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; text-align: center; cursor: pointer; border: none;">❌ Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
